{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block extra_css %}
<style>
    /* Стили */
    .register-container {
        max-width: 400px;
        margin: 50px auto;
        background: #e0e0e0;
        border: 1px solid #aaa;
        padding: 30px;
    }

    .register-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
        font-weight: normal;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #aaa;
        background: #f5f5f5;
    }

    .register-btn {
        width: 100%;
        padding: 12px;
        background: #888;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
    }

    .register-btn:hover {
        background: #666;
    }

    .login-link {
        text-align: center;
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid #aaa;
    }

    .login-link a {
        color: #333;
        text-decoration: none;
    }

    .login-link a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="register-container">
    <h2>Регистрация</h2>

    <form method="POST" action="/register">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" placeholder="Логин" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" placeholder="Пароль" required>
        </div>
        <button type="submit" class="register-btn">Зарегистрироваться</button>
    </form>

    <div class="login-link">
        Уже есть аккаунт? <a href="/login">Войти</a>
    </div>
</div>
{% endblock %}
