{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block extra_css %}
<style>
    /* Стили */
    .login-container {
        max-width: 400px;
        margin: 50px auto;
        background: #e0e0e0;
        border: 1px solid #aaa;
        padding: 30px;
    }

    .login-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
        font-weight: normal;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #aaa;
        background: #f5f5f5;
    }

    .login-btn {
        width: 100%;
        padding: 12px;
        background: #888;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
    }

    .login-btn:hover {
        background: #666;
    }

    .register-link {
        text-align: center;
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid #aaa;
    }

    .register-link a {
        color: #333;
        text-decoration: none;
    }

    .register-link a:hover {
        text-decoration: underline;
    }

    .error-message {
        background: #d68206;
        color: white;
        padding: 10px;
        margin-bottom: 20px;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <h2>Вход</h2>
    <form method="POST" action="/login">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" placeholder="Введите логин" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" placeholder="Введите пароль" required>
        </div>
        <button type="submit" class="login-btn">Войти</button>
    </form>

    <div class="register-link">
        Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </div>
</div>
{% endblock %}
