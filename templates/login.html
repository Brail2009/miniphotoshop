{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        max-width: 440px;
        margin: 60px auto;
        background: var(--glass-bg-strong);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        padding: 40px 36px;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        position: relative;
        overflow: hidden;
    }
    .login-container::before {
        content: "";
        position: absolute;
        top: -80px; right: -80px;
        width: 200px; height: 200px;
        background: radial-gradient(circle, rgba(255,198,79,0.4), transparent 70%);
        pointer-events: none;
    }

    .login-icon {
        width: 64px; height: 64px;
        margin: 0 auto 16px;
        background: linear-gradient(135deg, var(--accent), #ffb627);
        color: var(--navbar);
        display: flex; align-items: center; justify-content: center;
        border-radius: 18px;
        font-size: 24px;
        box-shadow: var(--shadow-glow);
    }

    .login-container h2 {
        text-align: center;
        margin-bottom: 8px;
        color: var(--text);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: -0.02em;
    }
    .login-subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text);
        font-size: 14px;
    }

    .form-group input {
        width: 100%;
        padding: 13px 16px;
    }

    .login-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--accent), #ffb627);
        color: var(--navbar);
        border: none;
        cursor: pointer;
        font-size: 16px;
        font-weight: 700;
        border-radius: 12px;
        margin-top: 8px;
        box-shadow: var(--shadow-glow);
        transition: all .25s ease;
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .login-btn:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, #ffb627, var(--accent));
    }

    .register-link {
        text-align: center;
        margin-top: 22px;
        padding-top: 20px;
        border-top: 1px solid rgba(255,255,255,0.6);
        color: var(--text-muted);
        font-size: 14px;
    }
    .register-link a {
        color: var(--panel);
        text-decoration: none;
        font-weight: 700;
    }
    .register-link a:hover { text-decoration: underline; }

    .error-message {
        background: linear-gradient(135deg, var(--accent), #ffb627);
        color: var(--navbar);
        padding: 12px 16px;
        margin-bottom: 20px;
        text-align: center;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
    }

    @media (max-width: 480px) {
        .login-container { margin: 30px 0; padding: 28px 22px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-icon"><i class="fa-solid fa-lock"></i></div>
    <h2>Вход</h2>
    <p class="login-subtitle">Войдите, чтобы продолжить редактирование</p>
    <form method="POST" action="/login">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" placeholder="Введите логин" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" placeholder="Введите пароль" required>
        </div>
        <button type="submit" class="login-btn">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> Войти
        </button>
    </form>

    <div class="register-link">
        Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </div>
</div>
{% endblock %}
