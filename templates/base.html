<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Минифотошоп - {% block title %}{% endblock %}</title>
    <style>
        /* Глобал стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e6e2e2;
            font-family: Arial, sans-serif;
        }

        /* Шапка */
        .header {
            background: #373737;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #5e5d5d;
        }

        .logo {
            color: #faf8f8;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .user-area {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-name {
            color: #cccaca;
        }

        .btn-header {
            background: #535252;
            color: #f6f2f2;
            padding: 8px 16px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-header:hover {
            background: #5e5c5c;
        }

        .main-container {
            padding: 20px;
            min-height: calc(100vh - 70px);
        }

        /* Кнопки */
        button, .btn {
            background: #ddd;
            border: 1px solid #999;
            padding: 8px 20px;
            cursor: pointer;
            font-family: inherit;
        }

        button:hover, .btn:hover {
            background: #ccc;
        }

        /* Формы */
        input, textarea {
            background: #f5f5f5;
            border: 1px solid #aaa;
            padding: 10px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #666;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Шапка -->
    <div class="header">
        <a href="/" class="logo">Минифотошоп</a>
        <div class="user-area">
            <span class="user-name">Пользователь</span>
            <a href="/library" class="btn-header">Библиотека</a>
            <a href="/login" class="btn-header">Войти</a>
        </div>
    </div>

    <!-- Основ -->
    <div class="main-container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
