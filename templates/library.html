{% extends "base.html" %}

{% block title %}Библиотека{% endblock %}

{% block extra_css %}
<style>
    /* Стили */
    .library-header {
        margin-bottom: 30px;
        padding-bottom: 15px;
        border-bottom: 2px solid #aaa;
    }

    .library-header h2 {
        color: #333;
        font-weight: normal;
    }

    /* Сетка */
    .library-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 25px;
        margin-bottom: 30px;
    }

    /* Фото-карточка */
    .photo-card {
        background: #e0e0e0;
        border: 1px solid #aaa;
        padding: 15px;
        text-align: center;
    }

    .photo-card:hover {
        scale: max(1.5);
    }

    .photo-image {
        width: 100%;
        height: 150px;
        background: #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #666;
        font-size: 14px;
        margin-bottom: 10px;
        border: 1px solid #999;
    }

    .photo-name {
        margin: 10px 0;
        font-size: 13px;
        color: #333;
        word-break: break-all;
    }

    .photo-date {
        font-size: 11px;
        color: #666;
        margin-bottom: 10px;
    }

    .delete-btn {
        background: #888;
        color: white;
        border: none;
        padding: 5px 12px;
        cursor: pointer;
        font-size: 12px;
    }

    .delete-btn:hover {
        background: #666;
    }

    /* Пустое состояние */
    .empty-library {
        text-align: center;
        padding: 60px;
        background: #e0e0e0;
        border: 1px solid #aaa;
    }

    .empty-library p {
        margin-top: 15px;
        color: #666;
    }

    .back-link {
        display: inline-block;
        margin-top: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="library-header">
    <h2>Библиотека</h2>
</div>

<!-- Сетка с фото -->
<div class="library-grid">
    <!-- Ненастоящие фото -->
    <div class="photo-card">
        <div class="photo-image">
            Фото 1
        </div>
        <div class="photo-name">фото1.jpg</div>
        <div class="photo-date">24.04.2016</div>
        <button class="delete-btn">Удалить</button>
    </div>

    <div class="photo-card">
        <div class="photo-image">
            Фото 2
        </div>
        <div class="photo-name">фото2.jpg</div>
        <div class="photo-date">23.04.2020</div>
        <button class="delete-btn">Удалить</button>
    </div>

    <div class="photo-card">
        <div class="photo-image">
            Фото 3
        </div>
        <div class="photo-name">фото3.jpg</div>
        <div class="photo-date">22.04.2011</div>
        <button class="delete-btn">Удалить</button>
    </div>

    <div class="photo-card">
        <div class="photo-image">
            Фото 4
        </div>
        <div class="photo-name">фото4.png</div>
        <div class="photo-date">21.04.2019</div>
        <button class="delete-btn">Удалить</button>
    </div>
</div>

<!-- Кнопка назад -->
<div style="text-align: center;">
    <a href="/" class="btn-header">Назад</a>
</div>
{% endblock %}
