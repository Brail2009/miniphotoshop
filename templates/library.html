{% extends "base.html" %}

{% block title %}Библиотека{% endblock %}

{% block extra_css %}
<style>
    .library-header {
        margin-bottom: 30px;
        padding: 20px 24px;
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        display: flex;
        align-items: center;
        gap: 14px;
    }
    .library-header h2 {
        color: var(--text);
        font-weight: 700;
        font-size: 24px;
        letter-spacing: -0.02em;
    }
    .library-header i {
        font-size: 22px;
        color: var(--white);
        background: linear-gradient(135deg, var(--panel), #3f8492);
        width: 44px; height: 44px;
        display: inline-flex; align-items: center; justify-content: center;
        border-radius: 12px;
        box-shadow: var(--shadow-sm);
    }

    .library-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 22px;
        margin-bottom: 30px;
    }

    .photo-card {
        background: var(--glass-bg-strong);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        padding: 14px;
        text-align: center;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        transition: all .3s cubic-bezier(.2,.8,.2,1);
    }
    .photo-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-lg);
        border-color: rgba(255,198,79,0.6);
    }

    .photo-image {
        width: 100%;
        height: 170px;
        background: linear-gradient(135deg, var(--panel), #3f8492);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--white);
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
        border-radius: 12px;
        position: relative;
        overflow: hidden;
    }
    .photo-image::after {
        content: "";
        position: absolute; inset: 0;
        background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.3), transparent 60%);
    }

    .photo-name {
        margin: 8px 0 4px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        word-break: break-all;
    }

    .photo-date {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 12px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    .delete-btn {
        background: rgba(220, 80, 80, 0.1);
        color: #c0392b;
        border: 1px solid rgba(220, 80, 80, 0.3);
        padding: 8px 16px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: all .2s ease;
    }
    .delete-btn:hover {
        background: #c0392b;
        color: var(--white);
        border-color: #c0392b;
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(192,57,43,0.3);
    }

    .empty-library {
        text-align: center;
        padding: 80px 30px;
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
    }
    .empty-library p {
        margin-top: 15px;
        color: var(--text-muted);
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 20px;
        padding: 12px 24px;
        background: linear-gradient(135deg, var(--accent), #ffb627);
        color: var(--navbar);
        text-decoration: none;
        border-radius: 12px;
        font-weight: 700;
        box-shadow: var(--shadow-glow);
        transition: all .25s ease;
    }
    .back-link:hover { transform: translateY(-2px); }

    @media (max-width: 640px) {
        .library-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
        .photo-image { height: 130px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="library-header">
    <i class="fa-regular fa-images"></i>
    <h2>Библиотека</h2>
</div>

<div class="library-grid">
    <div class="photo-card">
        <div class="photo-image">Фото 1</div>
        <div class="photo-name">фото1.jpg</div>
        <div class="photo-date"><i class="fa-regular fa-calendar"></i> 24.04.2016</div>
        <button class="delete-btn"><i class="fa-regular fa-trash-can"></i> Удалить</button>
    </div>

    <div class="photo-card">
        <div class="photo-image">Фото 2</div>
        <div class="photo-name">фото2.jpg</div>
        <div class="photo-date"><i class="fa-regular fa-calendar"></i> 23.04.2020</div>
        <button class="delete-btn"><i class="fa-regular fa-trash-can"></i> Удалить</button>
    </div>

    <div class="photo-card">
        <div class="photo-image">Фото 3</div>
        <div class="photo-name">фото3.jpg</div>
        <div class="photo-date"><i class="fa-regular fa-calendar"></i> 22.04.2011</div>
        <button class="delete-btn"><i class="fa-regular fa-trash-can"></i> Удалить</button>
    </div>

    <div class="photo-card">
        <div class="photo-image">Фото 4</div>
        <div class="photo-name">фото4.png</div>
        <div class="photo-date"><i class="fa-regular fa-calendar"></i> 21.04.2019</div>
        <button class="delete-btn"><i class="fa-regular fa-trash-can"></i> Удалить</button>
    </div>
</div>

<div style="text-align: center;">
    <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> Назад к редактору</a>
</div>
{% endblock %}
